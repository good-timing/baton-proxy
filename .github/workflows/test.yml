name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
        # Install the optional extras too, so the ExtMCP servicer + residency
        # sink tests actually run in CI (they self-skip / fake their client
        # when the extra is absent, which would silently drop coverage).
      - run: pip install -e ".[dev,extmcp,s3]"
      - run: ruff check .
      - run: pytest
